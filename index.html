<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Exam Question Paper Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p>Running Algorithms...</p>
    </div>

    <div class="glass-container">
        <header>
            <h1>Adaptive Exam Question Paper Generator</h1>
            <p>Powered by Classical Algorithm Design</p>
        </header>
        
        <main>
            <section class="config-panel">
                <h2>1. Configuration</h2>
                <form id="exam-form">
                    <div class="form-group">
                        <label for="total-marks">Total Marks:</label>
                        <input type="number" id="total-marks" name="totalMarks" value="50" min="10" max="500" required>
                    </div>
                    <div class="form-group">
                        <label for="num-questions">Number of Questions:</label>
                        <input type="number" id="num-questions" name="numQuestions" value="10" min="1" max="100" required>
                    </div>
                    
                    <fieldset>
                        <legend>Difficulty Distribution (%)</legend>
                        <div class="form-group split">
                            <div>
                                <label for="easy-ratio">Easy:</label>
                                <input type="number" id="easy-ratio" name="easyRatio" value="30" min="0" max="100">
                            </div>
                            <div>
                                <label for="medium-ratio">Medium:</label>
                                <input type="number" id="medium-ratio" name="mediumRatio" value="50" min="0" max="100">
                            </div>
                            <div>
                                <label for="hard-ratio">Hard:</label>
                                <input type="number" id="hard-ratio" name="hardRatio" value="20" min="0" max="100">
                            </div>
                        </div>
                    </fieldset>

                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <select id="subject" name="subject" class="form-input">
                            <option value="">Any Subject (Fully Random)</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Physics">Physics</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="English">English</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="chapters">Chapters (comma separated):</label>
                        <input type="text" id="chapters" name="chapters" placeholder="e.g. Algebra, Mechanics (Leave blank for all)">
                    </div>

                    <button type="submit" class="btn-primary" id="generate-btn">Generate Question Paper</button>
                    <button type="button" class="btn-secondary hidden" id="regenerate-btn">Regenerate Paper</button>
                </form>
            </section>

            <section class="results-panel">
                <div class="tabs">
                    <button class="tab-btn active" data-target="paper-view">Question Paper</button>
                    <button class="tab-btn" data-target="logs-view">Algorithm Logs</button>
                </div>

                <div id="paper-view" class="tab-content active">
                    <div id="summary-panel" class="hidden summary-panel">
                        <div class="summary-item" id="sum-marks">Marks: --/--</div>
                        <div class="summary-item" id="sum-count">Count: --/--</div>
                        <div class="summary-item" id="sum-diff">Diff: --</div>
                        <div class="summary-item" id="sum-subj">Subj: --</div>
                    </div>
                    
                    <div id="paper-container" class="paper-container">
                        <div class="placeholder">Generate an exam to see the preview here.</div>
                    </div>
                    <button id="print-btn" class="btn-primary" style="display: none; margin-top: 1rem;">Export to PDF</button>
                </div>

                <div id="logs-view" class="tab-content">
                    <div id="logs-container" class="logs-container">
                        <div class="placeholder">Algorithm execution logs will appear here.</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="algorithms.js"></script>
    <script src="app.js"></script>
</body>
</html>
